services:
  worklog-analytics:
    build: .
    container_name: worklog-analytics-container
    ports:
      - "8003:8003"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - trello-dashboard_trello_auth_data:/data:ro
    environment:
      - WORKLOG_DB_PATH=/app/data/worklog.db
      - AUTH_DB_PATH=/data/auth.db
      - TRELLO_CSV_PATH=/app/data/cards_enriched.csv
      - APP_SECRET_KEY=change-this-secret-key
    restart: unless-stopped

volumes:
  trello-dashboard_trello_auth_data:
    external: true
