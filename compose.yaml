services:
  worklog-analytics:
    build: .
    container_name: worklog-analytics-container
    ports:
      - "8003:8003"
    volumes:
      - ./data:/app/data
      - ../trello-dashboard/data:/home/junior/trello-dashboard/data:ro
    environment:
      - WORKLOG_DB_PATH=/app/data/worklog.db
    restart: unless-stopped
