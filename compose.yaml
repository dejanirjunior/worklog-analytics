services:
  worklog-analytics:
    build: .
    container_name: worklog-analytics-container
    ports:
      - "8003:8003"
    volumes:
      - /home/ubuntu/apps/trello-dashboard/data:/home/junior/trello-dashboard/data:ro
      - /home/ubuntu/apps/worklog-analytics/data:/app/data
    environment:
      - WORKLOG_DB_PATH=/app/data/worklog.db
    restart: unless-stopped
